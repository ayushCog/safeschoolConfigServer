spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**, /student/**, /parent/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: incident-service
          uri: lb://incident-service
          predicates:
            - Path=/incidents/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: resolution-service
          uri: lb://resolution-service
          predicates:
            - Path=/resolution/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: program-service
          uri: lb://program-service
          predicates:
            - Path=/program/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: training-service
          uri: lb://training-service
          predicates:
            - Path=/training/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notification/**
          filters:
            - name: Retry
              args:
                retries: 1

server:
  port: 8081

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 60
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${random.value}

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
