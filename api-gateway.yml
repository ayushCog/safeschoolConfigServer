spring:
  application:
    name: api-gateway

    cloud:
      gateway:
        routes:
          - id: auth-service
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/auth/**
            filters:
              - name: Retry
                args:
                  retries: 1

          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
              - Path=/user/**, /student/**, /parent/**
            filters:
              - AuthenticationFilter
              - name: Retry
                args:
                  retries: 1

server:
  port: 8081

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 60
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${random.value}

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
